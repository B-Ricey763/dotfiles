# ==========================================
# 1. CORE SETTINGS & PREFIX
# ==========================================
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Use Ctrl-a as prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Quality of Life
set -sg escape-time 10   # Eliminate Esc delay in Neovim
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-passthrough on
set -s set-clipboard on

# Bell/Notifications (Ghostty compatible)
set -g bell-action any
set -g visual-bell off
setw -g monitor-bell on

# ==========================================
# 2. KEY BINDINGS (CUSTOM & FIXED)
# ==========================================

# Force-fix broken default shortcuts
bind s choose-tree -Zs
bind '$' command-prompt -I "#S" "rename-session '%%'"

# Intuitive splitting (using | and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Switch panes (Prefix + h,j,k,l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Quick switch to last window (Prefix + a)
bind a last-window

# Switch windows (Alt + ,/.) - NO PREFIX NEEDED
bind -n M-, previous-window
bind -n M-. next-window

# Switch windows (Alt + 1-9) - NO PREFIX NEEDED
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Move/reorder windows (Prefix + < / >)
bind < swap-window -t -1\; select-window -t -1
bind > swap-window -t +1\; select-window -t +1

# Custom Scripts
bind -n C-Space display-popup -E -w 100 -h 25 "$HOME/scripts/tmux-switch-session"
bind g display-popup -E -w 80 -h 20 "$HOME/scripts/tmux-new-cfw-session"

# ==========================================
# 3. PLUGINS & STYLING (CATPPUCCIN)
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Configure Catppuccin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"

# Load Catppuccin BEFORE setting status-right
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Status line customization
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# ==========================================
# 4. INITIALIZE TPM (MUST BE LAST)
# ==========================================
setw -g mode-keys vi
run '~/.tmux/plugins/tpm/tpm'
